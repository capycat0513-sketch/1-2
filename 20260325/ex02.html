<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페</title>
</head>
<body>
    <h1>카페</h1>
    <button id="ice">아이스티</button>
    <button id="latte">카페라떼</button>
    <button id="mal">말차라떼</button>
    <button id="mint">민트초코라떼</button>
    <div id="divice"></div>
    <div id="divlatte"></div>
    <div id="divmal"></div>
    <div id="divmint"></div>
</body>
</html>
<script>
    let ice=0;
    document.getElementById('ice').onclick = function(){
        ice++
        document.getElementById('divice').textContent = '아이스티'+ice+ '개입니다'
    }
    let latte=0;
    document.getElementById('latte').onclick = function(){
        latte++
        document.getElementById('divlatte').textContent = '카페라떼'+latte+'개입니다'
    }
    let mal=0;
    document.getElementById('mal').onclick = function(){
        mal++
        document.getElementById('divmal').textContent = '말차라떼'+mal+'개입니다'
    }
    let mint=0;
    document.getElementById('mint').onclick = function(){
        mint++
        document.getElementById('divmint').textContent = '민트초코라떼'+mint+'개입니다'
    }
</script>
